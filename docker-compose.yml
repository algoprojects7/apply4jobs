version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: leadhire-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: prod_secure_password
      POSTGRES_DB: leadhire_prod
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: leadhire-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: leadhire-opensearch
    restart: always
    environment:
      - cluster.name=leadhire-cluster
      - node.name=leadhire-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - osdata:/usr/share/opensearch/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: leadhire-api
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:prod_secure_password@postgres:5432/leadhire_prod?schema=public
      - REDIS_URL=redis://redis:6379
      - OPENSEARCH_URL=http://opensearch:9200
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
      - opensearch

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: leadhire-web
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  osdata:
